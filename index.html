<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANG Solution Trading — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg:#f2f1ed;--surface:#ffffff;--surface2:#f7f6f2;--surface3:#eeecea;
    --border:#e0ddd6;--border2:#eae8e3;
    --text:#1a1814;--text2:#6b6760;--text3:#aaa49e;
    --accent:#1c3a5e;--accent2:#2b5080;--accent-lt:#e8eef5;
    --gold:#b08030;--gold-lt:#fdf4e7;
    --green:#1a7a4a;--green-lt:#e8f5ee;
    --orange:#c06020;--orange-lt:#fef0e6;
    --red:#b03030;--red-lt:#fdeaea;
    --blue:#1a50aa;--blue-lt:#e8eef8;
    --shopify:#4a7010;--shopify-bg:#f0f7e0;--shopify-border:#c0d880;
    --wix:#0c6ebd;--wix-bg:#e4f0fb;--wix-border:#90c4e8;
    --radius:12px;--radius-sm:8px;
    --shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}

  .sidebar{width:252px;background:var(--accent);display:flex;flex-direction:column;flex-shrink:0;}
  .sidebar-logo{padding:24px 22px 18px;border-bottom:1px solid rgba(255,255,255,0.1);}
  .logo-name{font-family:'Playfair Display',serif;font-size:16px;color:#fff;font-weight:700;line-height:1.3;}
  .logo-sub{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;}
  .sidebar-nav{padding:12px 10px;flex:1;overflow-y:auto;}
  .nav-section{font-size:8.5px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;padding:12px 12px 5px;margin-top:4px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;color:rgba(255,255,255,0.62);font-size:13px;font-weight:500;transition:all .15s;border:1px solid transparent;user-select:none;}
  .nav-item:hover{background:rgba(255,255,255,0.1);color:#fff;}
  .nav-item.active{background:rgba(255,255,255,0.16);color:#fff;border-color:rgba(255,255,255,0.15);}
  .nav-icon{font-size:14px;width:20px;text-align:center;}
  .sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.1);}
  .airtable-status{display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px;}
  .status-dot{width:7px;height:7px;border-radius:50%;background:#888;flex-shrink:0;}
  .status-dot.on{background:#4cde88;}

  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{padding:15px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,0.04);}
  .page-title{font-family:'Playfair Display',serif;font-size:23px;color:var(--accent);font-weight:600;}
  .topbar-right{display:flex;gap:8px;align-items:center;}
  .content{flex:1;overflow-y:auto;padding:22px 26px;}

  .btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:12.5px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
  .btn-secondary{background:var(--surface3);color:var(--text2);border:1px solid var(--border);}.btn-secondary:hover{background:var(--border);}
  .btn-danger{background:var(--red-lt);color:var(--red);border:1px solid #f0c8c8;}
  .btn-green{background:var(--green-lt);color:var(--green);border:1px solid #b8e0cc;}
  .btn-ics{background:#e8f0ff;color:#3366cc;border:1px solid #b8ccf0;}
  .btn-sm{padding:4px 11px;font-size:11px;}

  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;flex-shrink:0;color:#fff;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--accent);font-weight:600;margin-bottom:14px;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border-top:3px solid var(--accent);}
  .stat-icon{font-size:17px;margin-bottom:7px;}
  .stat-val{font-family:'Playfair Display',serif;font-size:26px;color:var(--accent);line-height:1;margin-bottom:3px;}
  .stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
  .stat-sub{margin-top:7px;font-size:11px;color:var(--text3);}

  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:9px 13px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;border-bottom:2px solid var(--border);white-space:nowrap;background:var(--surface2);}
  td{padding:11px 13px;border-bottom:1px solid var(--border2);font-size:13px;vertical-align:middle;}
  tr:hover td{background:var(--surface2);}
  tr:last-child td{border-bottom:none;}

  .badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10.5px;font-weight:600;}
  .plat-shopify{background:var(--shopify-bg);color:var(--shopify);border:1px solid var(--shopify-border);font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;display:inline-block;}
  .plat-wix{background:var(--wix-bg);color:var(--wix);border:1px solid var(--wix-border);font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;display:inline-block;}
  .plat-both{background:#f0eaf8;color:#6030a0;border:1px solid #d0b8f0;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;display:inline-block;}

  .toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
  .search-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;flex:1;min-width:180px;outline:none;box-shadow:var(--shadow);}
  .search-input:focus{border-color:var(--accent);}
  select.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;cursor:pointer;box-shadow:var(--shadow);}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,16,10,0.45);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px);}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
  .modal-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--accent);margin-bottom:20px;font-weight:600;}
  .form-row{margin-bottom:13px;}
  .form-label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:600;}
  .form-input,.form-select,.form-textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .15s;}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);background:var(--surface);}
  .form-textarea{resize:vertical;min-height:68px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .form-section{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;padding:14px 0 8px;border-top:1px solid var(--border);margin-top:6px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .four-col{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

  .detail-panel{position:fixed;right:0;top:0;bottom:0;width:400px;background:var(--surface);border-left:1px solid var(--border);z-index:100;overflow-y:auto;padding:22px;box-shadow:-4px 0 20px rgba(0,0,0,0.09);}
  .detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .detail-field{border-bottom:1px solid var(--border2);padding:10px 0;}
  .detail-field-label{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-weight:700;}
  .detail-field-value{font-size:13px;}

  .kanban{display:flex;gap:13px;overflow-x:auto;padding-bottom:12px;}
  .kanban-col{min-width:200px;flex:1;}
  .kanban-col-header{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
  .kanban-dot{width:9px;height:9px;border-radius:50%;}
  .kanban-col-label{font-weight:600;font-size:12px;color:var(--text2);}
  .kanban-col-total{margin-left:auto;font-size:10.5px;color:var(--text3);}
  .deal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:9px;border-left-width:3px;transition:all .12s;box-shadow:var(--shadow);}
  .deal-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .deal-card-title{font-weight:600;font-size:13px;margin-bottom:7px;}
  .deal-card-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);margin-bottom:8px;}
  .prob-bar{height:3px;background:var(--border);border-radius:99px;margin-top:7px;}
  .prob-fill{height:100%;border-radius:99px;}

  .rdv-item{display:flex;gap:13px;padding:13px 0;border-bottom:1px solid var(--border2);align-items:flex-start;}
  .rdv-check{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin-top:3px;}
  .rdv-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-shrink:0;}

  .history-item{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border2);}
  .history-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px;}
  .history-text{font-size:12.5px;}
  .history-date{font-size:10.5px;color:var(--text3);margin-top:2px;}

  .app-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;}
  .app-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;}
  .app-box-name{font-weight:700;font-size:12px;margin-bottom:7px;color:var(--accent);}
  .app-plan-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid var(--border2);}
  .app-plan-row:last-child{border-bottom:none;}
  .app-plan-label{color:var(--text2);}
  .app-plan-count{font-weight:700;}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:11px 22px;border-radius:99px;font-size:13px;font-weight:500;z-index:9999;box-shadow:var(--shadow-lg);animation:toastIn .22s ease;}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

  .tag-pill{display:inline-block;padding:2px 9px;background:var(--accent-lt);color:var(--accent);border-radius:99px;font-size:10.5px;margin:2px;font-weight:500;}
  .close-btn{background:none;border:none;color:var(--text3);font-size:19px;cursor:pointer;transition:color .15s;}.close-btn:hover{color:var(--text);}
  .empty-state{text-align:center;padding:44px;color:var(--text3);font-size:13.5px;}
  .page{animation:fadeIn .18s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  .hidden{display:none!important;}
  ::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

  .config-box{background:var(--accent-lt);border:1px solid #c0d4f0;border-radius:var(--radius);padding:18px;margin-bottom:16px;}
  .config-title{font-weight:700;font-size:13px;color:var(--accent);margin-bottom:12px;}
  .config-input{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;width:100%;outline:none;}
  .rev-total{font-weight:700;color:var(--accent);font-family:'Playfair Display',serif;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-name">BANG Solution<br>Trading</div>
    <div class="logo-sub">CRM · Apps Shopify &amp; Wix</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Menu principal</div>
    <div class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">⊞</span> Tableau de bord</div>
    <div class="nav-item" onclick="showPage('agences')"><span class="nav-icon">🏢</span> Agences</div>
    <div class="nav-item" onclick="showPage('pipeline')"><span class="nav-icon">▦</span> Pipeline</div>
    <div class="nav-item" onclick="showPage('rdv')"><span class="nav-icon">📅</span> Rendez-vous</div>
    <div class="nav-item" onclick="showPage('revenus')"><span class="nav-icon">💶</span> Revenus apps</div>
    <div class="nav-section">Export</div>
    <div class="nav-item" onclick="exportExcel()"><span class="nav-icon">📥</span> Exporter Excel</div>
    <div class="nav-item" onclick="exportSelectedICS()"><span class="nav-icon">📆</span> → Google Agenda</div>
    <div class="nav-section">Données</div>
    <div class="nav-item" onclick="exportJSON()"><span class="nav-icon">💾</span> Sauvegarder</div>
    <div class="nav-item" onclick="importJSON()"><span class="nav-icon">📂</span> Restaurer</div>
    <div class="nav-item" onclick="showPage('config')"><span class="nav-icon">⚙️</span> Configuration</div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="loadJSON(event)">
  </nav>
  <div class="sidebar-footer">
    <div style="font-size:11.5px;font-weight:600;color:#fff" id="sidebarCount">0 agences</div>
    <div class="airtable-status"><div class="status-dot" id="atDot"></div><span id="atTxt">Supabase non connecté</span></div>
    <div class="airtable-status" id="syncStatus" style="display:none"><div class="status-dot" style="background:#f0a040"></div><span id="syncTxt">Synchronisation…</span></div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title" id="pageTitle">Tableau de bord</div>
    <div class="topbar-right">
      <span style="font-size:11.5px;color:var(--text3)" id="todayDate"></span>
      <button class="btn btn-primary btn-sm hidden" id="topBtn" onclick="topAction()"></button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="detail-panel hidden" id="detailPanel"></div>
<div id="modalContainer"></div>

<script>
// ── APPS CONFIG ──
const APPS = {
  hexaship:{name:'Hexaship',platform:'shopify',desc:'Logistique',color:'#4a7010',bg:'#f0f7e0',border:'#c0d880',plans:['Basic','Grow','Advanced','Plus']},
  survey:  {name:'Survey App',platform:'wix',desc:'Sondages',color:'#0c6ebd',bg:'#e4f0fb',border:'#90c4e8',plans:['Unique']},
  panier:  {name:'Abandon Panier',platform:'wix',desc:'Récupération paniers',color:'#0c6ebd',bg:'#e4f0fb',border:'#90c4e8',plans:['Unique']},
};
// ── TARIFS dynamiques (éditables via ⚙️ Config sans toucher au code) ──
function getPrices(){return DB.config.prices||{hexaship:{Basic:29,Grow:59,Advanced:99,Plus:199},survey:{Unique:19},panier:{Unique:29}};}
function getPrice(app,plan){const p=getPrices();return(p[app]&&p[app][plan])||0;}
// ── PRIME : montant fixe par client ayant 6 mois d'ancienneté ──
function getPrimeAmount(){return DB.config.primeAmount!=null?DB.config.primeAmount:50;}
const PIPELINE_STAGES = ['Prospection','Premier contact','Démo','Proposition','Négociation','Signé','Perdu'];
const STAGE_COLORS = {Prospection:'#7a8aaa','Premier contact':'#5588cc',Démo:'#c09020',Proposition:'#d07020',Négociation:'#b05010',Signé:'#1a7a4a',Perdu:'#b03030'};
const STATUS_STYLES = {Actif:{bg:'#e8f5ee',color:'#1a7a4a',border:'#b8e0cc'},Prospect:{bg:'#fef0e6',color:'#c06020',border:'#f0cca8'},Inactif:{bg:'#f4f3ef',color:'#a8a49e',border:'#dcdad5'},Client:{bg:'#e8eef8',color:'#1a50aa',border:'#b8ccf0'}};
const PLAT_BADGE = {shopify:'<span class="plat-shopify">Shopify</span>',wix:'<span class="plat-wix">Wix</span>',both:'<span class="plat-both">Shopify + Wix</span>'};

function emptyAppSubs(){return {hexaship:{Basic:0,Grow:0,Advanced:0,Plus:0},survey:{Unique:0},panier:{Unique:0}};}

let DB = {
  agences:[
    {id:1,name:'Agence Pixel',contact:'Julie Bernard',email:'julie@agencepixel.fr',phone:'06 11 22 33 44',platform:'shopify',status:'Prospect',ca:250000,employees:8,apps:['hexaship'],appSubs:{hexaship:{Basic:3,Grow:2,Advanced:1,Plus:0},survey:{Unique:0},panier:{Unique:0}},notes:'Spécialisée mode & lifestyle. Très intéressée par Hexaship.',history:[{date:'2026-04-20',text:'Premier contact par email — intérêt confirmé pour Hexaship'},{date:'2026-04-15',text:'Découverte via LinkedIn'}],lastContact:'2026-04-20',tags:'Chaud,Mode'},
    {id:2,name:'WebCraft Studio',contact:'Arnaud Morel',email:'arnaud@webcraft.fr',phone:'07 55 66 77 88',platform:'wix',status:'Client',ca:180000,employees:5,apps:['survey','panier'],appSubs:{hexaship:{Basic:0,Grow:0,Advanced:0,Plus:0},survey:{Unique:4},panier:{Unique:2}},notes:'Agence Wix pure. Utilise déjà Survey et Abandon Panier.',history:[{date:'2026-04-18',text:'Renouvellement contrat Survey App — +2 clients'},{date:'2026-03-10',text:'Démo Abandon Panier — très convaincus'},{date:'2026-02-20',text:'Signature contrat initial Survey App'}],lastContact:'2026-04-18',tags:'VIP,Wix'},
    {id:3,name:'Novastyle Agency',contact:'Clara Dupont',email:'clara@novastyle.agency',phone:'06 99 88 77 66',platform:'both',status:'Prospect',ca:420000,employees:15,apps:[],appSubs:emptyAppSubs(),notes:'Grande agence mixte Shopify+Wix. Potentiel fort sur les 3 apps.',history:[{date:'2026-04-19',text:'Démo planifiée pour le 30/04'}],lastContact:'2026-04-19',tags:'Grands comptes,Chaud'},
  ],
  deals:[
    {id:1,title:'Hexaship — Agence Pixel',agenceId:1,app:'hexaship',value:1200,stage:'Démo',probability:60,closeDate:'2026-05-20',notes:'Démo prévue'},
    {id:2,title:'Survey + Panier — Novastyle',agenceId:3,app:'survey',value:3500,stage:'Proposition',probability:45,closeDate:'2026-06-01',notes:'Toutes apps à proposer'},
    {id:3,title:'Renouvellement WebCraft',agenceId:2,app:'panier',value:2400,stage:'Signé',probability:100,closeDate:'2026-04-18',notes:'Signé !'},
  ],
  rdvs:[
    {id:1,type:'Démo',agenceId:1,contact:'Julie Bernard',date:'2026-04-30',heure:'14:00',note:'Démo Hexaship — préparer cas logistique mode',done:false,exportCal:false},
    {id:2,type:'Réunion',agenceId:3,contact:'Clara Dupont',date:'2026-05-03',heure:'10:00',note:'Présentation des 3 apps — Novastyle',done:false,exportCal:false},
    {id:3,type:'Appel',agenceId:2,contact:'Arnaud Morel',date:'2026-04-22',heure:'11:00',note:'Point renouvellement WebCraft',done:true,exportCal:false},
  ],
  config:{airtableToken:'',airtableBaseId:'',tableAgences:'Agences',tableDeals:'Pipeline',tableRdvs:'RDV'}
};

let currentPage='dashboard',searchQ='',filterPlat='all',filterStatus='all';

// ── Helpers ──
const fmt=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const fmtDate=d=>d?new Date(d+'T12:00:00').toLocaleDateString('fr-FR'):'—';
const nextId=arr=>arr.length?Math.max(...arr.map(x=>x.id))+1:1;
const AVC=['#1c3a5e','#2a6050','#5a3060','#6a4020','#204060','#3a4a20','#602020'];
const avColor=n=>AVC[n.charCodeAt(0)%AVC.length];
const inits=n=>n.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
const ava=(n,s=34)=>`<div class="avatar" style="width:${s}px;height:${s}px;font-size:${s*.36}px;background:${avColor(n)}">${inits(n)}</div>`;
const badgeSt=(t,st)=>`<span class="badge" style="background:${st.bg};color:${st.color};border:1px solid ${st.border}">${t}</span>`;

// ── PRIMES ──
// Calcule toutes les primes dues : agences avec clients ayant >= 6 mois d'abonnement
function computePrimes(){
  const today=new Date();
  const primes=[];
  DB.agences.forEach(ag=>{
    if(!ag.appSubsDates)return;
    Object.entries(ag.appSubsDates).forEach(([appKey,plans])=>{
      Object.entries(plans).forEach(([plan,dateStr])=>{
        if(!dateStr)return;
        const start=new Date(dateStr);
        const months=(today.getFullYear()-start.getFullYear())*12+(today.getMonth()-start.getMonth());
        const count=(ag.appSubs&&ag.appSubs[appKey]&&ag.appSubs[appKey][plan])||0;
        if(count>0&&months>=6){
          // Check if prime already acknowledged
          const primeKey=`prime_${ag.id}_${appKey}_${plan}`;
          const alreadyDone=(DB.primesDone||[]).includes(primeKey);
          primes.push({agenceId:ag.id,agenceName:ag.name,appKey,appName:APPS[appKey]?APPS[appKey].name:appKey,plan,count,months,dateStr,amount:getPrimeAmount()*count,primeKey,alreadyDone});
        }
      });
    });
  });
  return primes;
}

function renderPrimeAlerts(){
  const primes=computePrimes().filter(p=>!p.alreadyDone);
  if(!primes.length)return '';
  return `<div class="card" style="border:2px solid #c09020;background:#fffdf0">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <span style="font-size:20px">🏆</span>
      <div style="font-family:'Playfair Display',serif;font-size:15px;color:#8a6010;font-weight:600">Primes agences à verser — ${primes.length} rappel${primes.length>1?'s':''}</div>
    </div>
    ${primes.map(p=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0e0a0">
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px">${p.agenceName}</div>
        <div style="font-size:11.5px;color:var(--text2)">${p.appName} · Plan ${p.plan} · ${p.count} client${p.count>1?'s':''} · ${p.months} mois d&#39;utilisation</div>
      </div>

      <button class="btn btn-sm" style="background:#fdf4e7;color:#8a6010;border:1px solid #e0c070" onclick="markPrimeDone('${p.primeKey}')">✓ Versée</button>
    </div>`).join('')}
    <div style="font-size:11px;color:#a08030;margin-top:10px">Prime de ${fmt(getPrimeAmount())} par client ayant atteint 6 mois · Montant modifiable dans ⚙️ Config</div>
  </div>`;
}

function markPrimeDone(key){
  if(!DB.primesDone)DB.primesDone=[];
  if(!DB.primesDone.includes(key))DB.primesDone.push(key);
  saveAndRender();toast('Prime marquée comme versée ✓');
}

// Injecte les rappels de prime dans les RDV automatiquement
function injectPrimeRdvs(){
  const primes=computePrimes().filter(p=>!p.alreadyDone);
  primes.forEach(p=>{
    const existingNote=`🏆 PRIME à verser : ${p.agenceName} — ${p.appName} Plan ${p.plan}`;
    const alreadyInRdv=DB.rdvs.some(r=>r.note===existingNote&&!r.done);
    if(!alreadyInRdv){
      DB.rdvs.unshift({id:nextId(DB.rdvs),type:'Prime',agenceId:p.agenceId,contact:'',note:existingNote,date:new Date().toISOString().slice(0,10),heure:'',done:false,exportCal:false,isPrime:true});
    }
  });
}

function addHistory(agId){
  const txt=document.getElementById('newHistText').value.trim();if(!txt)return;
  const a=DB.agences.find(x=>x.id===agId);if(!a)return;

  a.history.push({date:new Date().toISOString().slice(0,10),text:txt});
  a.lastContact=new Date().toISOString().slice(0,10);
  saveAndRender();openAgence(agId);toast('Échange ajouté ✓');
}

// ── EXPORT ICS ──
function exportSelectedICS(){
  const sel=DB.rdvs.filter(r=>r.exportCal&&!r.done);
  if(!sel.length){toast('☑ Cochez d\'abord des RDV à exporter',false);return;}
  const pad=n=>String(n).padStart(2,'0');
  function icsDate(d,h){const dt=new Date((d||'2026-01-01')+'T'+(h||'09:00')+':00');return `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;}
  let ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//BANG Solution Trading//CRM//FR\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n`;
  sel.forEach(r=>{
    const ag=DB.agences.find(a=>a.id===r.agenceId);
    const start=icsDate(r.date,r.heure);
    const endH=r.heure?String(Number(r.heure.split(':')[0])+1).padStart(2,'0')+':'+r.heure.split(':')[1]:'10:00';
    const end=icsDate(r.date,endH);
    ics+=`BEGIN:VEVENT\r\nUID:bang-rdv-${r.id}-${Date.now()}@bang-solution-trading\r\nDTSTAMP:${icsDate(new Date().toISOString().slice(0,10),'00:00')}Z\r\nDTSTART:${start}\r\nDTEND:${end}\r\nSUMMARY:[${r.type}] ${r.note}\r\nDESCRIPTION:Agence : ${ag?ag.name:'—'}\\nContact : ${r.contact||'—'}\\nType : ${r.type}\r\nCATEGORIES:CRM,${r.type}\r\nEND:VEVENT\r\n`;
  });
  ics+=`END:VCALENDAR`;
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='BANG_RDV_Agenda.ics';a.click();URL.revokeObjectURL(url);
  toast(`${sel.length} RDV exporté${sel.length>1?'s':''} → Google Agenda ✓`);
}

function updateSyncStatus(state){
  // Also update config page dot if visible
  const cfgDot=document.getElementById('cfgDot');

  if(state==='ok'&&cfgDot){cfgDot.style.background='#4cde88';if(cfgTxt)cfgTxt.textContent='Connecté et synchronisé';}
  else if(state==='error'&&cfgDot){cfgDot.style.background='#e05555';if(cfgTxt)cfgTxt.textContent='Erreur de connexion';}
  const dot = document.getElementById('atDot');
  const txt = document.getElementById('atTxt');
  const syncDiv = document.getElementById('syncStatus');

  if(!dot) return;
  if(state === 'ok'){
    dot.className='status-dot on'; txt.textContent='Supabase connecté';
    if(syncDiv) syncDiv.style.display='none';
  } else if(state === 'connecting'){
    dot.className='status-dot'; dot.style.background='#f0a040'; txt.textContent='Connexion…';
  } else if(state === 'syncing'){
    if(syncDiv){ syncDiv.style.display='flex'; syncTxt.textContent='Sync en cours…'; }
  } else if(state === 'error'){
    dot.className='status-dot'; dot.style.background='#e05555'; txt.textContent='Hors ligne (local)';
    if(syncDiv) syncDiv.style.display='none';
  }
}

// ── LOAD from Supabase ──
async function loadFromSupabase(){
  if(!supa) return false;
  try{
    updateSyncStatus('connecting');
    const [ag, dl, rv, cfg] = await Promise.all([
      supa.from('agences').select('*').order('id'),
      supa.from('deals').select('*').order('id'),
      supa.from('rdvs').select('*').order('id'),
      supa.from('config').select('*').limit(1),
    ]);
    if(ag.error || dl.error || rv.error) throw ag.error||dl.error||rv.error;

    DB.agences = (ag.data||[]).map(r=>({...r.data, _supa_id: r.id}));
    DB.deals   = (dl.data||[]).map(r=>({...r.data, _supa_id: r.id}));
    DB.rdvs    = (rv.data||[]).map(r=>({...r.data, _supa_id: r.id}));
    if(cfg.data&&cfg.data.length>0){
      const c = cfg.data[0].data;
      DB.config = {...DB.config, ...c};
      DB.primesDone = c.primesDone||[];
    }
    saveToLocalStorage();
    updateSyncStatus('ok');
    return true;
  } catch(e){
    console.warn('Supabase load error:', e);
    updateSyncStatus('error');
    return false;
  }
}

// ── SAVE to Supabase ──
async function saveToSupabase(){
  if(!supa || isSyncing) return;
  isSyncing = true;
  updateSyncStatus('syncing');
  try{
    // Upsert agences
    for(const a of DB.agences){
      const {_supa_id, ...data} = a;
      if(_supa_id){
        await supa.from('agences').update({data}).eq('id', _supa_id);
      } else {
        const res = await supa.from('agences').insert({data}).select().single();
        if(res.data) a._supa_id = res.data.id;
      }
    }
    // Upsert deals
    for(const d of DB.deals){
      const {_supa_id, ...data} = d;
      if(_supa_id){
        await supa.from('deals').update({data}).eq('id', _supa_id);
      } else {
        const res = await supa.from('deals').insert({data}).select().single();
        if(res.data) d._supa_id = res.data.id;
      }
    }
    // Upsert rdvs
    for(const r of DB.rdvs){
      const {_supa_id, ...data} = r;
      if(_supa_id){
        await supa.from('rdvs').update({data}).eq('id', _supa_id);
      } else {
        const res = await supa.from('rdvs').insert({data}).select().single();
        if(res.data) r._supa_id = res.data.id;
      }
    }
    // Save config
    const cfgData = {...DB.config, primesDone: DB.primesDone||[]};
    const existing = await supa.from('config').select('id').limit(1);
    if(existing.data&&existing.data.length>0){
      await supa.from('config').update({data: cfgData}).eq('id', existing.data[0].id);
    } else {
      await supa.from('config').insert({data: cfgData});
    }
    saveToLocalStorage();
    updateSyncStatus('ok');
  } catch(e){
    console.warn('Supabase save error:', e);
    updateSyncStatus('error');
    toast('⚠️ Erreur sync — données sauvées localement', false);
  }
  isSyncing = false;
}

// ── REALTIME subscription ──
function subscribeRealtime(){
  if(!supa) return;
  syncChannel = supa.channel('bang-crm-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'agences'}, ()=>reloadFromSupabase())
    .on('postgres_changes', {event:'*', schema:'public', table:'deals'},   ()=>reloadFromSupabase())
    .on('postgres_changes', {event:'*', schema:'public', table:'rdvs'},    ()=>reloadFromSupabase())
    .subscribe(status=>{
      if(status==='SUBSCRIBED'){ updateSyncStatus('ok'); }
    });
}

let reloadTimeout = null;
async function reloadFromSupabase(){
  // Debounce — wait 800ms before reloading to batch multiple changes
  clearTimeout(reloadTimeout);
  reloadTimeout = setTimeout(async ()=>{
    await loadFromSupabase();
    injectPrimeRdvs();
    render();
    toast('🔄 Données synchronisées');
  }, 800);
}
